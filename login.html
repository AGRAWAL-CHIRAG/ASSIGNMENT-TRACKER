<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    </style>
    <title>Secure Login</title>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card">
                    <h3 class="text-center fw-bold mb-4">Portal Sign-In</h3>
                    <form action="/login" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Select Role</label>
                            <select name="role" class="form-select" required>
                                <option value="student">Student</option>
                                <option value="faculty">Faculty</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="User ID" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Enter Dashboard</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
